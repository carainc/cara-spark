# Cara Spark — the OSS deliverable: `docker compose up` boots the whole stack.
# Single-VM networking (runbook §G): containers bind host ports; the EC2 SG is the only firewall.
name: cara-spark

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cara
      POSTGRES_PASSWORD: cara
      POSTGRES_DB: cara_spark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cara -d cara_spark"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # One-shot: apply schema + seed super-admin/sample, then exit. Built from the `build` stage
  # (has prisma + tsx). App waits for this to complete.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cara:cara@postgres:5432/cara_spark?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pnpm db:push && pnpm db:seed"
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://cara:cara@postgres:5432/cara_spark?schema=public
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${AUTH_URL:-http://localhost:3000}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: lk_local_dev_only_min_32_chars_000000000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  livekit:
    image: livekit/livekit-server:latest
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./config/livekit.yaml:/etc/livekit.yaml:ro
    # IMPORTANT: livekit-server does NOT expand ${...} inside the mounted YAML — it yaml.Unmarshals
    # the file as-is (os.ExpandEnv is applied only to key_file). Anything dynamic is set via the env
    # vars the server actually recognizes, supplied through .env (NOT as hard-coded empty defaults —
    # an EMPTY-but-present NODE_IP / LIVEKIT_KEYS counts as "set" to the server's CLI parser and would
    # wipe the file's keys / corrupt IP discovery, crashing the server). Absent locally → the YAML's
    # devkey + automatic IP are used; set on the box via .env:
    #   • NODE_IP=<EC2 Elastic IP>           — advertised RTC/ICE address (the 1:1-NAT media quirk;
    #     replaces the old, never-expanded nat_1_to_1_ip). On the box: NODE_IP=$LIVEKIT_NAT_1_TO_1_IP.
    #   • LIVEKIT_KEYS="<api_key>: <secret>" — overrides the YAML devkey.
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    healthcheck:
      # /rtc/validate is the server's lightweight liveness endpoint; if the config fails to parse the
      # process exits and this never goes healthy (so the failure is visible, not a silent absence).
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:7880/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  livekit-sip:
    image: livekit/sip:latest
    command: ["--config", "/etc/sip.yaml"]
    volumes:
      - ./config/sip.yaml:/etc/sip.yaml:ro
    environment:
      # SIP keys must match the LiveKit server keys. The SIP binary reads its credentials from
      # LIVEKIT_API_KEY / LIVEKIT_API_SECRET (NOT from sip.yaml, which omits them — see config/sip.yaml).
      # Local: the dev placeholder (matches config/livekit.yaml's devkey); on the box, the real keys
      # come from .env (SIP_API_KEY / SIP_API_SECRET must equal the LIVEKIT_KEYS pair). NOT secrets locally.
      LIVEKIT_API_KEY: ${SIP_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${SIP_API_SECRET:-lk_local_dev_only_min_32_chars_000000000}
    depends_on:
      livekit:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"

  agent-worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    env_file:
      - .env
    environment:
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: lk_local_dev_only_min_32_chars_000000000
      # The worker calls the app's no-PHI policy endpoints (model PROPOSES, engine DECIDES) and
      # authenticates with an HMAC bearer token. VOICE_CONFIG_HMAC_SECRET comes from .env.
      VOICE_APP_BASE_URL: http://app:3000
      VOICE_AGENT_NAME: ${VOICE_AGENT_NAME:-cara-spark-cascade}
      VOICE_ROOM_PREFIX: ${VOICE_ROOM_PREFIX:-voicephone-}
    depends_on:
      # Wait for LiveKit to be HEALTHY (not merely started) so the worker doesn't crash-connect to
      # ws://livekit:7880 before the server has parsed its config and bound the port.
      livekit:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
