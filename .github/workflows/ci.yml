name: ci

# ADVISORY on intra-build pushes (runbook gap #8): typecheck + eval are required; the unit
# suite is advisory while the engine is being ported (T1). The heavy Playwright/eval RELEASE
# gate runs at integration, not per-commit.
on:
  push:
    branches: [epic/fable5-build, main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: typecheck
        run: pnpm typecheck
      - name: unit tests (advisory until T1 lands the engine)
        run: pnpm test
        continue-on-error: true
      - name: eval gate (local fallback)
        run: pnpm eval
