# LiveKit server config — works for BOTH local compose AND the standalone EC2 (T13).
#
# ‼️  livekit-server does NOT expand ${ENV} inside this file. It yaml.Unmarshals the body verbatim
#     (os.ExpandEnv is applied only to `key_file`). A line like `nat_1_to_1_ip: ${LIVEKIT_NAT_1_TO_1_IP}`
#     is therefore read as a LITERAL "${LIVEKIT_NAT_1_TO_1_IP}" — not a valid IP — and the server EXITS
#     on config parse. (That literal-${} line is exactly why the `livekit` service was crash-absent.)
#     So everything dynamic is set via the env vars the server actually recognizes, NOT via ${} here.
#
# Local compose: use_external_ip:false and no advertised external IP (containers share host ports via
#   the published port mappings). The dev key below is NOT a secret.
# Standalone EC2: the box must advertise its ELASTIC IP for RTP/ICE (single-VM, 1:1 NAT — THE media
#   quirk). Do that with the server's own env var, set by compose (see docker-compose.yml `livekit`):
#     NODE_IP=<EC2 Elastic IP>           # advertised RTC address — replaces the old nat_1_to_1_ip
#     LIVEKIT_KEYS="<api_key>: <secret>" # overrides the dev key below
#   Both are wired through compose from .env (LIVEKIT_NAT_1_TO_1_IP → NODE_IP, LIVEKIT_KEYS).
port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  # MUST be true on the standalone EC2 box. NODE_IP (the Elastic IP) is still advertised for the
  # carrier's public RTP, but on a single-VM deploy the agent-worker AND livekit-sip run as containers
  # on the SAME box and CANNOT reach the instance's own Elastic IP (AWS does not hairpin traffic from
  # an instance to its own EIP — verified: a container TCP-connect to 52.203.137.71:7881 TIMES OUT,
  # while the instance-private IP / docker-bridge address connect fine). With use_external_ip:false the
  # server advertised ONLY the unreachable EIP as its ICE candidate, so the agent's WebRTC media
  # PeerConnection in ctx.connect() never reached Connected and timed out after 10s
  # ("room not connect after job_entry was called after 10 seconds") — the agent never joined and the
  # SIP caller heard silence ("rings but no pickup"). Setting this true makes LiveKit ALSO gather its
  # local-interface host candidates (private IP / bridge) IN ADDITION to NODE_IP, so the co-located
  # agent gets a LAN-reachable candidate while the external carrier still uses the EIP. (Locally under
  # plain compose this is harmless — it just adds the container's own interface as a candidate.)
  use_external_ip: true

# Keys: the devkey below is a LOCAL-ONLY placeholder (min 32 chars) so compose comes up without real
# keys. On the box, the LIVEKIT_KEYS env var ("APIxxxx: <secret>", wired in docker-compose.yml)
# overrides it — the server merges env keys over the file.
keys:
  devkey: lk_local_dev_only_min_32_chars_000000000

# Redis lets the server + the SIP service share state. The compose stack ships a `redis` service,
# and the standalone EC2 runs that SAME compose, so this literal works in both places.
redis:
  address: redis:6379

logging:
  level: info
